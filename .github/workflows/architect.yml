name: Strategy Architect
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: strategy-architect
  cancel-in-progress: true

jobs:
  evaluate-and-plan:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Open Issues
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh issue list --state open --json number,title > open_issues.json || echo "[]" > open_issues.json

      - name: Build Codebase Overview
        run: |
          (
            echo "You are the Lead Architect for a Screeps bot."
            echo "Analyze the current directory structure, AGENTS.md phase milestones, and CURRENT OPEN ISSUES."
            echo "**EVALUATION DIRECTIVES:**"
            echo "1. Look at the open issues. If recent code changes have already solved them, or if they are redundant/obsolete, add their issue numbers to 'issues_to_close'."
            echo "2. Identify the SINGLE most critical missing system or optimization."
            echo "3. If a critical component is missing, set 'create_new' to true and fill out 'new_issue'."
            echo "4. If the current phase is stable and no immediate action is required, set 'create_new' to false."
            echo "**CRITICAL CONSTRAINTS:**"
            echo "- Keep the scope of any new issue limited to 1-3 files maximum."
            echo "- Provide strict acceptance criteria."
            echo "--- OPEN ISSUES ---"
            cat open_issues.json
            echo ""
            echo "--- AGENTS.md ---"
            cat AGENTS.md 2>/dev/null || echo "[AGENTS.md NOT FOUND]"
            echo ""
            echo "--- CURRENT DIRECTORY TREE ---"
            find src -type f | sort || echo "No files found."
          ) > prompt_context.txt

      - name: Generate Action Plan JSON
        id: generate-plan
        run: |
          jq -n --rawfile text prompt_context.txt '{
            contents: [{parts: [{"text": $text}]}], 
            generationConfig: {
              temperature: 0.1,
              responseMimeType: "application/json",
              responseSchema: {
                type: "OBJECT",
                properties: {
                  issues_to_close: { 
                    type: "ARRAY", 
                    items: { type: "INTEGER" },
                    description: "List of issue numbers that are resolved or obsolete."
                  },
                  create_new: { 
                    type: "BOOLEAN",
                    description: "True if a new issue should be created, false if we should wait."
                  },
                  new_issue: {
                    type: "OBJECT",
                    properties: {
                      title: { type: "STRING" },
                      body: { type: "STRING", description: "Detailed Markdown body with acceptance criteria." },
                      files_to_touch: { type: "ARRAY", items: { type: "STRING" } }
                    }
                  }
                },
                required: ["issues_to_close", "create_new"]
              }
            }
          }' > payload.json
          
          MODELS=("gemini-2.5-flash" "gemini-3.1-flash-lite")
          SUCCESS=false
          MAX_RETRIES=3
          
          for MODEL in "${MODELS[@]}"; do
            for ((i=1; i<=MAX_RETRIES; i++)); do
              HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://generativelanguage.googleapis.com/v1beta/models/$MODEL:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
                -H 'Content-Type: application/json' \
                -d @payload.json)
                
              HTTP_BODY=$(echo "$HTTP_RESPONSE" | sed '$d')
              HTTP_STATUS=$(echo "$HTTP_RESPONSE" | tail -n 1)
              
              if [ "$HTTP_STATUS" -eq 200 ]; then
                CLEAN_TEXT=$(echo "$HTTP_BODY" | jq -r '.candidates[0].content.parts[0].text // empty')
                if [[ -n "$CLEAN_TEXT" && "$CLEAN_TEXT" != "null" ]]; then
                  SUCCESS=true
                  echo "$CLEAN_TEXT" > generated_plan.json
                  break 2
                fi
              fi
              sleep 5
            done
          done
          
          if [ "$SUCCESS" = false ]; then
            echo "::error::Failed to generate action plan."
            exit 1
          fi

      - name: Execute Action Plan
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # 1. Close obsolete issues
          ISSUES_TO_CLOSE=$(jq -r '.issues_to_close[]?' generated_plan.json)
          for issue in $ISSUES_TO_CLOSE; do
            echo "Closing obsolete issue #$issue..."
            gh issue close "$issue" -m "Autonomously closed by Strategy Architect: Evaluated as resolved or obsolete." || true
          done

          # 2. Evaluate if we need to create a new issue
          CREATE_NEW=$(jq -r '.create_new' generated_plan.json)
          if [ "$CREATE_NEW" == "true" ]; then
            TITLE=$(jq -r '.new_issue.title' generated_plan.json)
            FILES=$(jq -r '.new_issue.files_to_touch | join(", ")' generated_plan.json)
            BODY=$(jq -r '.new_issue.body' generated_plan.json)
            
            FULL_BODY=$(printf "**Target Files:** %s\n\n%s" "$FILES" "$BODY")
            
            # Ensure labels exist to prevent creation failure
            gh label create "architect-proposal" --color "0E8A16" --force || true
            gh label create "jules-approved" --color "0052cc" --force || true
            
            echo "Creating and auto-approving new issue: $TITLE"
            gh issue create --title "[Architect] $TITLE" --body "$FULL_BODY" --label "architect-proposal,jules-approved"
          else
            echo "Architect determined no new issues are required at this time."
          fi