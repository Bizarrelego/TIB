name: Strategy Architect
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: strategy-architect
  cancel-in-progress: true

jobs:
  evaluate-and-plan:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Build Codebase Overview
        run: |
          (
            echo "You are the Lead Architect for a Screeps bot."
            echo "Analyze the current directory structure and AGENTS.md phase milestones."
            echo "Identify the SINGLE most critical missing system or file."
            echo "Output a JSON object for a GitHub Issue to build this component."
            echo "**CRITICAL CONSTRAINTS:**"
            echo "1. Only propose 1 issue at a time."
            echo "2. Keep the scope limited to 1-3 files maximum."
            echo "3. You must provide strict acceptance criteria."
            echo "--- AGENTS.md ---"
            cat AGENTS.md 2>/dev/null || echo "[AGENTS.md NOT FOUND]"
            echo ""
            echo "--- CURRENT DIRECTORY TREE ---"
            find src -type f | sort || echo "No files found."
          ) > prompt_context.txt

      - name: Generate Issue JSON
        id: generate-issue
        run: |
          jq -n --rawfile text prompt_context.txt '{
            contents: [{parts: [{"text": $text}]}], 
            generationConfig: {
              temperature: 0.1,
              responseMimeType: "application/json",
              responseSchema: {
                type: "OBJECT",
                properties: {
                  title: { type: "STRING" },
                  body: { type: "STRING", description: "Detailed Markdown body with acceptance criteria." },
                  files_to_touch: { type: "ARRAY", items: { type: "STRING" } }
                },
                required: ["title", "body", "files_to_touch"]
              }
            }
          }' > payload.json
          
          # Retry loop with fallback models
          MODELS=("gemini-2.5-flash" "gemini-3.1-flash-lite")
          SUCCESS=false
          MAX_RETRIES=3
          
          for MODEL in "${MODELS[@]}"; do
            for ((i=1; i<=MAX_RETRIES; i++)); do
              HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://generativelanguage.googleapis.com/v1beta/models/$MODEL:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
                -H 'Content-Type: application/json' \
                -d @payload.json)
                
              HTTP_BODY=$(echo "$HTTP_RESPONSE" | sed '$d')
              HTTP_STATUS=$(echo "$HTTP_RESPONSE" | tail -n 1)
              
              if [ "$HTTP_STATUS" -eq 200 ]; then
                CLEAN_TEXT=$(echo "$HTTP_BODY" | jq -r '.candidates[0].content.parts[0].text // empty')
                if [[ -n "$CLEAN_TEXT" && "$CLEAN_TEXT" != "null" ]]; then
                  SUCCESS=true
                  echo "$CLEAN_TEXT" > generated_issue.json
                  break 2
                fi
              fi
              sleep 5
            done
          done
          
          if [ "$SUCCESS" = false ]; then
            echo "::error::Failed to generate issue plan."
            exit 1
          fi

      - name: Create GitHub Issue
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TITLE=$(jq -r '.title' generated_issue.json)
          FILES=$(jq -r '.files_to_touch | join(", ")' generated_issue.json)
          BODY=$(jq -r '.body' generated_issue.json)
          
          FULL_BODY=$(printf "**Target Files:** %s\n\n%s" "$FILES" "$BODY")
          
          gh issue create --title "[Architect] $TITLE" --body "$FULL_BODY" --label "architect-proposal"