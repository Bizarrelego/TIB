name: Strategy Loop
on:
  push:
    branches: [main]
jobs:
  plan-next:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Prompt Context
        run: |
          delimiter="$(openssl rand -hex 8)"
          echo "PROMPT_TEXT<<$delimiter" >> "$GITHUB_ENV"
          echo "Current progress: SpawnManager and Economy are functional." >> "$GITHUB_ENV"
          echo "Based on the following architecture and agent rules, what is the next priority for RCL 3? Output ONLY a command for Jules." >> "$GITHUB_ENV"
          echo "--- AGENTS.md ---" >> "$GITHUB_ENV"
          cat AGENTS.md >> "$GITHUB_ENV" || echo "[WARNING: AGENTS.md NOT FOUND]" >> "$GITHUB_ENV"
          echo "--- arch.html ---" >> "$GITHUB_ENV"
          cat architecture/arch.html >> "$GITHUB_ENV" || echo "[WARNING: arch.html NOT FOUND]" >> "$GITHUB_ENV"
          echo "$delimiter" >> "$GITHUB_ENV"

      - name: Get Next Task
        id: plan-next
        uses: google-github-actions/run-gemini-cli@v0
        env:
          GEMINI_CLI_TRUST_WORKSPACE: true
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: "gemini-3.1-flash-lite"
          prompt: ${{ env.PROMPT_TEXT }}

      - name: Trigger Jules
        run: |
          curl -X POST https://jules.googleapis.com/v1alpha/sessions \
          -H "Content-Type: application/json" \
          -H "X-Goog-Api-Key: ${{ secrets.JULES_TOKEN }}" \
          -d '{
            "prompt": "${{ steps.plan-next.outputs.response }}",
            "sourceContext": {
              "source": "sources/github/YOUR_GITHUB_USERNAME/TIB",
              "githubRepoContext": {
                "startingBranch": "main"
              }
            },
            "automationMode": "AUTO_CREATE_PR"
          }'