name: Strategy Loop
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      specific_task:
        description: 'Force a specific task (leave blank for auto)'
        required: false
        type: string

concurrency:
  group: strategy-loop
  cancel-in-progress: true

jobs:
  plan-next:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 15
      
      - name: Build Prompt Context
        run: |
          delimiter="$(openssl rand -hex 8)"
          {
            echo "PROMPT_TEXT<<${delimiter}"
            echo "You are the Lead Architect for a Screeps bot."
            echo "Analyze the current codebase and determine the EXACT NEXT SINGLE FILE to create or modify."
            if [ -n "${{ inputs.specific_task }}" ]; then
              echo "USER DIRECTIVE: ${{ inputs.specific_task }}"
            fi
            echo "**CRITICAL CONSTRAINTS:**"
            echo "1. Output a prompt for a junior AI agent (Jules)."
            echo "2. Your prompt MUST restrict Jules to editing or creating EXACTLY ONE FILE. Do not batch tasks."
            echo "3. Include a 'Files to READ' list containing dependencies for that single file."
            echo "--- RECENT GIT HISTORY ---"
            git log -n 5 --oneline --no-merges || echo "No history."
            echo ""
            echo "--- CURRENT CODEBASE CONTENTS ---"
            # Injects actual code, limiting to prevent token overflow
            find src -name "*.js" -type f -exec sh -c 'echo "FILE: {}"; head -n 100 "{}"; echo "---"' \; || echo "No JS files found."
            echo "${delimiter}"
          } >> "$GITHUB_ENV"

      - name: Get Next Task
        id: plan-next
        run: |
          PAYLOAD=$(jq -n --arg text "$PROMPT_TEXT" '{contents: [{parts: [{"text": $text}]}], generationConfig: {temperature: 0.2}}')
          
          API_RES=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD")
            
          CLEAN_TEXT=$(echo "$API_RES" | jq -r '.candidates[0].content.parts[0].text // empty')
          
          if [[ -z "$CLEAN_TEXT" ]]; then
            echo "::error::Gemini API Failed. Raw Response: $API_RES"
            exit 1
          fi
          
          delimiter="$(openssl rand -hex 8)"
          {
            echo "gemini_response<<${delimiter}"
            echo "$CLEAN_TEXT"
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Trigger Jules
        env:
          GEMINI_RESPONSE: ${{ steps.plan-next.outputs.gemini_response }}
        run: |
          AGENTS_DATA=$(cat AGENTS.md 2>/dev/null || echo "[AGENTS.md missing]")
          
          FULL_PROMPT=$(cat <<EOF
          SYSTEM CONSTRAINTS - STRICTLY ENFORCED:
          ${AGENTS_DATA}
          
          =========================================
          YOUR EXACT TASK:
          ${GEMINI_RESPONSE}
          EOF
          )
          
          PAYLOAD=$(jq -n --arg prompt "$FULL_PROMPT" '{
            prompt: $prompt,
            sourceContext: {
              source: "sources/github/${{ github.repository }}",
              githubRepoContext: {
                startingBranch: "main"
              }
            },
            automationMode: "AUTO_CREATE_PR"
          }')
          
          curl -s -X POST https://jules.googleapis.com/v1alpha/sessions \
          -H "Content-Type: application/json" \
          -H "X-Goog-Api-Key: ${{ secrets.JULES_TOKEN }}" \
          -d "$PAYLOAD"
