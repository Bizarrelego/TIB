name: Strategy Loop
on:
  push:
    branches: [main]
jobs:
  plan-next:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Prompt Context
        run: |
          delimiter="$(openssl rand -hex 8)"
          {
            echo "PROMPT_TEXT<<${delimiter}"
            echo "Based on the current progress and agent rules below, determine the exact next priority for the Screeps bot."
            echo "Write a comprehensive prompt for an AI coding agent (Jules) to execute this priority. The prompt must tell Jules exactly what feature to build, which directories to use, and explicitly instruct Jules to strictly obey AGENTS.md."
            echo "**CRITICAL INSTRUCTION FOR JULES:** You must explicitly instruct Jules that its final action in the PR must be to update PROGRESS.md to document the new features it just built."
            echo "--- CURRENT PROGRESS ---"
            cat PROGRESS.md || echo "No PROGRESS.md found."
            echo ""
            echo "--- AGENTS.md ---"
            cat AGENTS.md 2>/dev/null || echo "[WARNING: AGENTS.md NOT FOUND]"
            echo ""
            echo "${delimiter}"
          } >> "$GITHUB_ENV"

      - name: Get Next Task
        id: plan-next
        run: |
          # Safely package the prompt into JSON
          PAYLOAD=$(jq -n --arg text "$PROMPT_TEXT" '{contents: [{parts: [{"text": $text}]}]}')
          
          # Direct API Call
          API_RES=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD")
            
          # Extract the text
          CLEAN_TEXT=$(echo "$API_RES" | jq -r '.candidates[0].content.parts[0].text // empty')
          
          if [[ -z "$CLEAN_TEXT" ]]; then
            echo "::error::Gemini API Failed. Raw Response: $API_RES"
            exit 1
          fi
          
          # Safely export to GitHub outputs
          delimiter="$(openssl rand -hex 8)"
          {
            echo "gemini_response<<${delimiter}"
            echo "$CLEAN_TEXT"
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Trigger Jules
        env:
          GEMINI_RESPONSE: ${{ steps.plan-next.outputs.gemini_response }}
        run: |
          PAYLOAD=$(jq -n --arg prompt "$GEMINI_RESPONSE" '{
            prompt: $prompt,
            sourceContext: {
              source: "sources/github/Bizarrelego/TIB",
              githubRepoContext: {
                startingBranch: "main"
              }
            },
            automationMode: "AUTO_CREATE_PR"
          }')
          
          curl -X POST https://jules.googleapis.com/v1alpha/sessions \
          -H "Content-Type: application/json" \
          -H "X-Goog-Api-Key: ${{ secrets.JULES_TOKEN }}" \
          -d "$PAYLOAD"