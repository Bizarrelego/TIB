name: Strategy Loop
on:
  push:
    branches: [main]

# Kills duplicate runs instantly
concurrency:
  group: strategy-loop
  cancel-in-progress: true

jobs:
  plan-next:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 15 # Fetch history to read past tasks
      
      - name: Build Prompt Context
        run: |
          delimiter="$(openssl rand -hex 8)"
          {
            echo "PROMPT_TEXT<<${delimiter}"
            echo "Determine the exact next priority for the Screeps bot."
            echo "Write a comprehensive prompt for an AI coding agent (Jules) to execute this priority."
            echo "**CRITICAL FILE I/O CONSTRAINTS:**"
            echo "1. You must provide Jules with a strict 'File Manifest' divided into two sections: Files to READ for context, and Files to EDIT."
            echo "2. Instruct Jules: Read the contextual files first to understand existing variables, imports, and architectures."
            echo "3. Instruct Jules: DO NOT run unbounded search commands (like grep across the whole repo). Stick strictly to reading and editing the files defined in your manifest."
            echo "4. Instruct Jules: DO NOT rewrite entire files. Use precise insertions and diffs to modify existing logic."
            echo "--- RECENT BOT UPDATES (COMPLETED TASKS) ---"
            git log -n 10 --oneline --no-merges || echo "No history found."
            echo ""
            echo "--- CURRENT BOT FILES ---"
            ls -R src/ || echo "No src directory yet"
            echo ""
            echo "--- AGENTS.md ---"
            cat AGENTS.md 2>/dev/null || echo "[WARNING: AGENTS.md NOT FOUND]"
            echo ""
            echo "${delimiter}"
          } >> "$GITHUB_ENV"

      - name: Get Next Task
        id: plan-next
        run: |
          PAYLOAD=$(jq -n --arg text "$PROMPT_TEXT" '{contents: [{parts: [{"text": $text}]}]}')
          
          API_RES=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD")
            
          CLEAN_TEXT=$(echo "$API_RES" | jq -r '.candidates[0].content.parts[0].text // empty')
          
          if [[ -z "$CLEAN_TEXT" ]]; then
            echo "::error::Gemini API Failed. Raw Response: $API_RES"
            exit 1
          fi
          
          delimiter="$(openssl rand -hex 8)"
          {
            echo "gemini_response<<${delimiter}"
            echo "$CLEAN_TEXT"
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Trigger Jules
        env:
          GEMINI_RESPONSE: ${{ steps.plan-next.outputs.gemini_response }}
        run: |
          # Pre-seed the context by combining Gemini's task with the AGENTS.md constraints
          AGENTS_DATA=$(cat AGENTS.md 2>/dev/null || echo "[AGENTS.md missing]")
          FULL_PROMPT=$(cat <<EOF
          ${GEMINI_RESPONSE}
          
          --- SYSTEM CONSTRAINTS (AGENTS.md) ---
          ${AGENTS_DATA}
          EOF
          )
          
          PAYLOAD=$(jq -n --arg prompt "$FULL_PROMPT" '{
            prompt: $prompt,
            sourceContext: {
              source: "sources/github/${{ github.repository }}",
              githubRepoContext: {
                startingBranch: "main"
              }
            },
            automationMode: "AUTO_CREATE_PR"
          }')
          
          curl -s -X POST https://jules.googleapis.com/v1alpha/sessions \
          -H "Content-Type: application/json" \
          -H "X-Goog-Api-Key: ${{ secrets.JULES_TOKEN }}" \
          -d "$PAYLOAD"