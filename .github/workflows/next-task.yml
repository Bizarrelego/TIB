name: Strategy Loop
on:
  push:
    branches: [main]
jobs:
  plan-next:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Prompt Context
        run: |
          delimiter="$(openssl rand -hex 8)"
          {
            echo "PROMPT_TEXT<<${delimiter}"
            echo "Current progress: SpawnManager and Economy are functional."
            echo "Based on the following agent rules, what is the next priority for RCL 3? Output ONLY a command for Jules."
            echo "--- AGENTS.md ---"
            cat AGENTS.md 2>/dev/null || echo "[WARNING: AGENTS.md NOT FOUND]"
            echo ""
            echo "${delimiter}"
          } >> "$GITHUB_ENV"

      - name: Get Next Task
        id: plan-next
        uses: google-github-actions/run-gemini-cli@v0
        env:
          GEMINI_CLI_TRUST_WORKSPACE: true
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: "gemini-3.1-flash-lite"
          gemini_debug: false 
          prompt: ${{ env.PROMPT_TEXT }}

      - name: Trigger Jules
        env:
          GEMINI_RESPONSE: ${{ steps.plan-next.outputs.gemini_response }}
        run: |
          if [[ -z "$GEMINI_RESPONSE" ]]; then
            echo "::error::Gemini returned an empty response. Check the 'Get Next Task' logs."
            exit 1
          fi
          
          PAYLOAD=$(jq -n --arg prompt "$GEMINI_RESPONSE" '{
            prompt: $prompt,
            sourceContext: {
              source: "sources/github/Bizarrelego/TIB",
              githubRepoContext: {
                startingBranch: "main"
              }
            },
            automationMode: "AUTO_CREATE_PR"
          }')
          
          curl -X POST https://jules.googleapis.com/v1alpha/sessions \
          -H "Content-Type: application/json" \
          -H "X-Goog-Api-Key: ${{ secrets.JULES_TOKEN }}" \
          -d "$PAYLOAD"