name: Strategy Loop
on:
  push:
    branches: [main]
jobs:
  plan-next:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get Next Task
        uses: google-github-actions/run-gemini-cli@v1
        with:
          api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: "Current progress: SpawnManager and Economy are functional. Based on arch.html, what is the next priority? Output a command for Jules."
      - name: Trigger Jules
        run: |
          curl -X POST https://api.jules.ai/v1/runs \
          -H "Authorization: Bearer ${{ secrets.JULES_TOKEN }}" \
          -d "{\"prompt\": \"${{ steps.plan-next.outputs.response }}\"}"