name: Strategy Loop
on:
  push:
    branches: [main]
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      specific_task:
        description: 'Force a specific task (leave blank for auto)'
        required: false
        type: string

concurrency:
  group: strategy-loop
  cancel-in-progress: true

jobs:
  plan-next:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 15
      
      - name: Build Prompt Context
        run: |
          (
            echo "You are the Lead Architect for a Screeps bot."
            echo "We are in the BOOTSTRAP PHASE. Analyze the codebase and output a prompt for Jules to generate the EXACT NEXT LOGICAL MODULE."
            if [ -n "${{ inputs.specific_task }}" ]; then
              echo "USER DIRECTIVE: ${{ inputs.specific_task }}"
            fi
            echo "**CRITICAL CONSTRAINTS:**"
            echo "1. A 'Module' is a group of 3 to 5 closely related files. DO NOT ask Jules to build the entire bot at once."
            echo "2. Output a strict 'Files to CREATE/EDIT' list for Jules."
            echo "3. Follow this strict bootstrap order. Only move to the next phase if the previous files exist and look complete:"
            echo "   - Phase 1: OS & Memory (main.js, os/cache.js, os/memoryProxy.js, os/eventBus.js)"
            echo "   - Phase 2: State & Radar (state/discoveryManager.js, state/stateScanner.js)"
            echo "   - Phase 3: Traffic Control (traffic/trafficManager.js, traffic/deadlock.js, utils/movement.js)"
            echo "   - Phase 4: Core Economy Roles (roles/harvester.js, roles/hauler.js, roles/worker.js)"
            echo "   - Phase 5: Colony & Spawning (colonies/colonyManager.js, colonies/spawnManager.js, colonies/spawnLedger.js)"
            echo "   - Phase 6: Base Logistics (colonies/logisticsManager.js, roles/fastFiller.js, roles/hubManager.js)"
            echo "--- RECENT GIT HISTORY ---"
            git log -n 5 --oneline --no-merges || echo "No history."
            echo ""
            echo "--- CURRENT CODEBASE CONTENTS ---"
            find src -name "*.js" -type f -exec sh -c 'echo "FILE: {}"; head -n 100 "{}"; echo "---"' \; || echo "No JS files found."
          ) > prompt_context.txt

      - name: Get Next Task (With Retry & Fallback)
        id: plan-next
        run: |
          jq -n --rawfile text prompt_context.txt '{contents: [{parts: [{"text": $text}]}], generationConfig: {temperature: 0.2}}' > payload.json
          
          MODELS=("gemini-2.5-flash" "gemini-3.1-flash-lite")
          SUCCESS=false
          MAX_RETRIES=3
          
          for MODEL in "${MODELS[@]}"; do
            echo "Attempting inference with $MODEL..."
            
            for ((i=1; i<=MAX_RETRIES; i++)); do
              HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://generativelanguage.googleapis.com/v1beta/models/$MODEL:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
                -H 'Content-Type: application/json' \
                -d @payload.json)
                
              HTTP_BODY=$(echo "$HTTP_RESPONSE" | sed '$d')
              HTTP_STATUS=$(echo "$HTTP_RESPONSE" | tail -n 1)
              
              if [ "$HTTP_STATUS" -eq 200 ]; then
                CLEAN_TEXT=$(echo "$HTTP_BODY" | jq -r '.candidates[0].content.parts[0].text // empty')
                if [[ -n "$CLEAN_TEXT" && "$CLEAN_TEXT" != "null" ]]; then
                  echo "Successfully generated task using $MODEL."
                  SUCCESS=true
                  break 2 # Break out of both retry and model loops
                else
                  echo "::warning::Model returned empty response. Trying next model."
                  break # Break retry loop, move to next model
                fi
              elif [[ "$HTTP_STATUS" -eq 429 || "$HTTP_STATUS" -ge 500 ]]; then
                echo "::warning::High usage/Error for $MODEL (HTTP $HTTP_STATUS). Retry $i/$MAX_RETRIES in $((i * 15))s..."
                sleep $((i * 15))
              else
                echo "::error::API Error with $MODEL (HTTP $HTTP_STATUS): $HTTP_BODY"
                break # Fatal error (e.g. 400 Bad Request), move to next model
              fi
            done
          done
          
          if [ "$SUCCESS" = false ]; then
            echo "::error::All Gemini models failed or quotas exhausted after retries."
            exit 1
          fi
          
          echo "$CLEAN_TEXT" > jules_task.txt

      - name: Trigger Jules
        run: |
          (
            echo "SYSTEM CONSTRAINTS - STRICTLY ENFORCED:"
            cat AGENTS.md 2>/dev/null || echo "[AGENTS.md missing]"
            echo ""
            echo "========================================="
            echo "YOUR EXACT TASK:"
            cat jules_task.txt
          ) > full_jules_prompt.txt
          
          jq -n --rawfile prompt full_jules_prompt.txt '{
            prompt: $prompt,
            sourceContext: {
              source: "sources/github/${{ github.repository }}",
              githubRepoContext: {
                startingBranch: "main"
              }
            },
            automationMode: "AUTO_CREATE_PR"
          }' > jules_payload.json
          
          curl -s -X POST https://jules.googleapis.com/v1alpha/sessions \
          -H "Content-Type: application/json" \
          -H "X-Goog-Api-Key: ${{ secrets.JULES_TOKEN }}" \
          -d @jules_payload.json