name: TIB Auto-Review
on:
  pull_request:
    branches: [main]
jobs:
  gemini-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Architect Review
        uses: google-github-actions/run-gemini-cli@v1
        with:
          api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: "Analyze the diff in this PR. Ensure it uses global.State for O(1) lookups and does not violate the architecture in TIB/architecture/arch.html. If approved, say 'LGTM'."
      - name: Auto-Merge
        if: contains(steps.gemini-check.outputs.response, 'LGTM')
        run: gh pr merge --auto --merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}