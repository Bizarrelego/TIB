name: TIB Auto-Review
on:
  pull_request:
    branches: [main]
jobs:
  gemini-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Build Review Context
        run: |
          git diff origin/main > pr_diff.txt || true
          delimiter="$(openssl rand -hex 8)"
          echo "REVIEW_TEXT<<$delimiter" >> "$GITHUB_ENV"
          echo "Analyze the code changes in the diff below. Ensure the new code uses global.State for O(1) lookups and does not violate the architecture. If approved, reply EXACTLY with 'LGTM'." >> "$GITHUB_ENV"
          echo "--- AGENTS.md ---" >> "$GITHUB_ENV"
          cat AGENTS.md >> "$GITHUB_ENV" || echo "[WARNING: AGENTS.md NOT FOUND]" >> "$GITHUB_ENV"
          echo "--- arch.html ---" >> "$GITHUB_ENV"
          cat architecture/arch.html >> "$GITHUB_ENV" || echo "[WARNING: arch.html NOT FOUND]" >> "$GITHUB_ENV"
          echo "--- PR DIFF ---" >> "$GITHUB_ENV"
          cat pr_diff.txt >> "$GITHUB_ENV" || echo "[WARNING: pr_diff.txt NOT FOUND]" >> "$GITHUB_ENV"
          echo "$delimiter" >> "$GITHUB_ENV"

      - name: Architect Review
        id: gemini-check
        uses: google-github-actions/run-gemini-cli@v0
        env:
          GEMINI_CLI_TRUST_WORKSPACE: true
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: "gemini-3.1-flash-lite"
          prompt: ${{ env.REVIEW_TEXT }}

      - name: Auto-Merge
        if: contains(steps.gemini-check.outputs.response, 'LGTM')
        run: gh pr merge ${{ github.event.pull_request.number }} --auto --merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}