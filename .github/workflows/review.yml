name: TIB Auto-Review
on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  test-and-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install
        
      - name: Enforce JS Strictness
        run: |
          TS_FILES=$(find src/ -type f -name "*.ts")
          if [ ! -z "$TS_FILES" ]; then
            echo "::error::TypeScript files are strictly forbidden. Convert all logic to vanilla JavaScript."
            exit 1
          fi

      - name: Run Syntax & Lint Tests
        id: run-tests
        run: npm run test > lint_output.txt 2>&1
        continue-on-error: true

      - name: Reject on Test Failure
        if: steps.run-tests.outcome == 'failure'
        run: |
          (
            echo "@jules Code failed static analysis and linting. Fix syntax errors before architectural review:"
            echo ""
            echo "\`\`\`text"
            cat lint_output.txt
            echo "\`\`\`"
          ) > formatted_comment.txt
          
          PAYLOAD=$(jq -Rs '{body: .}' formatted_comment.txt)
          
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            -d "$PAYLOAD"
            
          exit 1

      - name: Build Review Context
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt || true
          delimiter="$(openssl rand -hex 8)"
          {
            echo "REVIEW_TEXT<<${delimiter}"
            echo "You are a ruthless Screeps architect enforcing Tigga-style efficiency."
            echo "Analyze the PR diff below against the AGENTS.md constraints."
            echo "CRITICAL DIRECTIVE: You are reading a unified git diff. ONLY evaluate added lines (lines starting with '+'). IGNORE deleted lines (lines starting with '-')."
            echo "CRITICAL CHECKS:"
            echo "- Are there ANY room.find(), room.lookAt(), or getEventLog() calls inside tick loops? (Auto-reject)"
            echo "- Are they using standard {} objects instead of Map() for dictionaries? (Auto-reject)"
            echo "--- AGENTS.md ---"
            cat AGENTS.md 2>/dev/null || echo "[AGENTS.md NOT FOUND]"
            echo ""
            echo "--- PR DIFF ---"
            cat pr_diff.txt 2>/dev/null || echo "[pr_diff.txt NOT FOUND]"
            echo "${delimiter}"
          } >> "$GITHUB_ENV"

      - name: Architect Review (With Fallback)
        id: gemini-check
        run: |
          PAYLOAD=$(jq -n --arg text "$REVIEW_TEXT" '{
            contents: [{parts: [{"text": $text}]}], 
            generationConfig: {
              temperature: 0.1,
              responseMimeType: "application/json",
              responseSchema: {
                type: "OBJECT",
                properties: {
                  status: { type: "STRING", enum: ["APPROVE", "REJECT"] },
                  feedback: { type: "STRING" }
                },
                required: ["status", "feedback"]
              }
            }
          }')
          
          MODELS=("gemini-2.5-flash" "gemini-3.1-flash-lite")
          SUCCESS=false
          
          for MODEL in "${MODELS[@]}"; do
            echo "Attempting review with $MODEL..."
            
            HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://generativelanguage.googleapis.com/v1beta/models/$MODEL:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
              -H 'Content-Type: application/json' \
              -d "$PAYLOAD")
              
            HTTP_BODY=$(echo "$HTTP_RESPONSE" | sed '$d')
            HTTP_STATUS=$(echo "$HTTP_RESPONSE" | tail -n 1)
            
            if [ "$HTTP_STATUS" -eq 200 ]; then
              CLEAN_TEXT=$(echo "$HTTP_BODY" | jq -r '.candidates[0].content.parts[0].text // empty')
              if [[ -n "$CLEAN_TEXT" && "$CLEAN_TEXT" != "null" ]]; then
                echo "Successfully generated review using $MODEL."
                SUCCESS=true
                break
              fi
            elif [ "$HTTP_STATUS" -eq 429 ]; then
              echo "::warning::Quota exceeded for $MODEL (HTTP 429). Falling back to next model..."
            else
              echo "::error::API Error with $MODEL (HTTP $HTTP_STATUS): $HTTP_BODY"
            fi
          done
          
          if [ "$SUCCESS" = false ]; then
            echo "::error::All Gemini models failed or quotas exhausted."
            exit 1
          fi
          
          STATUS=$(echo "$CLEAN_TEXT" | jq -r '.status')
          FEEDBACK=$(echo "$CLEAN_TEXT" | jq -r '.feedback')
          
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          
          delimiter="$(openssl rand -hex 8)"
          echo "feedback<<${delimiter}" >> "$GITHUB_OUTPUT"
          echo "$FEEDBACK" >> "$GITHUB_OUTPUT"
          echo "${delimiter}" >> "$GITHUB_OUTPUT"

      - name: Submit GitHub PR Comment
        env:
          FEEDBACK: ${{ steps.gemini-check.outputs.feedback }}
        run: |
          echo "@jules" > formatted_review.txt
          echo "" >> formatted_review.txt
          printf "%s\n" "$FEEDBACK" >> formatted_review.txt
          
          PAYLOAD=$(jq -Rs '{body: .}' formatted_review.txt)
          
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            -d "$PAYLOAD"
            
          if [ "${{ steps.gemini-check.outputs.status }}" != "APPROVE" ]; then
            exit 1
          fi

      - name: Auto-Merge PR
        if: steps.gemini-check.outputs.status == 'APPROVE'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: gh pr merge ${{ github.event.pull_request.number }} --merge --auto