name: TIB Auto-Review
on:
  pull_request:
    branches: [main]
jobs:
  gemini-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Build Review Context
        run: |
          git diff origin/main > pr_diff.txt
          {
            echo "REVIEW_TEXT<<EOF"
            echo "Analyze the code changes in the diff below. Ensure the new code uses global.State for O(1) lookups and does not violate the architecture. If approved, reply EXACTLY with 'LGTM'."
            echo "--- AGENTS.md ---"
            cat AGENTS.md || echo "[WARNING: AGENTS.md NOT FOUND]"
            echo "--- arch.html ---"
            cat architecture/arch.html || echo "[WARNING: arch.html NOT FOUND]"
            echo "--- PR DIFF ---"
            cat pr_diff.txt || echo "[WARNING: pr_diff.txt NOT FOUND]"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Architect Review
        id: gemini-check
        uses: google-github-actions/run-gemini-cli@v0
        env:
          GEMINI_CLI_TRUST_WORKSPACE: true
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: "gemini-3.1-flash-lite"
          prompt: ${{ env.REVIEW_TEXT }}

      - name: Auto-Merge
        if: contains(steps.gemini-check.outputs.response, 'LGTM')
        run: gh pr merge ${{ github.event.pull_request.number }} --auto --merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}