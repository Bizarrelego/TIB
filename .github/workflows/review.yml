name: TIB Auto-Review
on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  test-and-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Removed cache: 'npm'

      - name: Install Dependencies
        # Changed from npm ci to npm install
        run: npm install
        
      - name: Enforce JS Strictness
        run: |
          TS_FILES=$(find src/ -type f -name "*.ts")
          if [ ! -z "$TS_FILES" ]; then
            echo "::error::TypeScript files are strictly forbidden in this repository. Convert all logic to vanilla JavaScript."
            exit 1
          fi

      - name: Run Syntax & Lint Tests
        id: run-tests
        run: npm run test > lint_output.txt 2>&1
        continue-on-error: true

      - name: Reject on Test Failure
        if: steps.run-tests.outcome == 'failure'
        run: |
          BODY_TEXT=$(cat <<EOF
          @jules Code failed static analysis and linting. Fix the exact syntax errors below before requesting architectural review:
          
          \`\`\`text
          $(cat lint_output.txt)
          \`\`\`
          EOF
          )
          
          PAYLOAD=$(jq -n --arg body "$BODY_TEXT" '{body: $body}')
          
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            -d "$PAYLOAD"
            
          exit 1

      - name: Build Review Context
        # Only runs if tests passed
        run: |
          git diff origin/main > pr_diff.txt || true
          delimiter="$(openssl rand -hex 8)"
          {
            echo "REVIEW_TEXT<<${delimiter}"
            echo "Analyze the code changes in the diff below against the provided constraints."
            echo "If the code passes ALL constraints, reply EXACTLY with 'LGTM'."
            echo "If the code fails, reply with a detailed markdown list of what is wrong, exactly which files violate the rules, and how to fix the code to match the Tigga-style constraints."
            echo "--- AGENTS.md ---"
            cat AGENTS.md 2>/dev/null || echo "[WARNING: AGENTS.md NOT FOUND]"
            echo ""
            echo "--- PR DIFF ---"
            cat pr_diff.txt 2>/dev/null || echo "[WARNING: pr_diff.txt NOT FOUND]"
            echo ""
            echo "${delimiter}"
          } >> "$GITHUB_ENV"

      - name: Architect Review
        id: gemini-check
        run: |
          PAYLOAD=$(jq -n --arg text "$REVIEW_TEXT" '{contents: [{parts: [{"text": $text}]}]}')
          
          API_RES=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD")
            
          CLEAN_TEXT=$(echo "$API_RES" | jq -r '.candidates[0].content.parts[0].text // empty')
          
          if [[ -z "$CLEAN_TEXT" ]]; then
            echo "::error::Gemini API Failed. Raw Response: $API_RES"
            exit 1
          fi
          
          delimiter="$(openssl rand -hex 8)"
          {
            echo "gemini_response<<${delimiter}"
            echo "$CLEAN_TEXT"
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Request Architectural Changes
        if: "!contains(steps.gemini-check.outputs.gemini_response, 'LGTM')"
        env:
          CRITIQUE: ${{ steps.gemini-check.outputs.gemini_response }}
        run: |
          PAYLOAD=$(jq -n --arg body "@jules $CRITIQUE" '{body: $body}')
          
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            -d "$PAYLOAD"

      - name: Auto-Merge
        if: contains(steps.gemini-check.outputs.gemini_response, 'LGTM')
        run: gh pr merge ${{ github.event.pull_request.number }} --auto --merge
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}