name: TIB Auto-Review
on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  test-and-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install
        
      - name: Enforce JS Strictness
        run: |
          TS_FILES=$(find src/ -type f -name "*.ts")
          if [ ! -z "$TS_FILES" ]; then
            echo "::error::TypeScript files are strictly forbidden. Convert all logic to vanilla JavaScript."
            exit 1
          fi

      - name: Run Syntax & Lint Tests
        id: run-tests
        run: npm run test > lint_output.txt 2>&1
        continue-on-error: true

      - name: Reject on Test Failure
        if: steps.run-tests.outcome == 'failure'
        run: |
          PAYLOAD=$(jq -Rs --arg prefix "Code failed static analysis and linting. Fix syntax errors before architectural review:\n\n\`\`\`text\n" --arg suffix "\n\`\`\`" '{body: ($prefix + . + $suffix), event: "REQUEST_CHANGES"}' lint_output.txt)
          
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
            -d "$PAYLOAD"
            
          exit 1

      - name: Build Review Context
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt || true
          delimiter="$(openssl rand -hex 8)"
          {
            echo "REVIEW_TEXT<<${delimiter}"
            echo "You are a ruthless Screeps architect enforcing Tigga-style efficiency."
            echo "Analyze the PR diff below against the AGENTS.md constraints."
            echo "CRITICAL DIRECTIVE: You are reading a unified git diff. ONLY evaluate added lines (lines starting with '+'). IGNORE deleted lines (lines starting with '-')."
            echo "CRITICAL CHECKS:"
            echo "- Are there ANY room.find(), room.lookAt(), or getEventLog() calls inside tick loops? (Auto-reject)"
            echo "- Are they using standard {} objects instead of Map() for dictionaries? (Auto-reject)"
            echo "Respond STRICTLY in JSON format: {\"status\": \"APPROVE\"|\"REJECT\", \"feedback\": \"Detailed markdown explanation\"}"
            echo "--- AGENTS.md ---"
            cat AGENTS.md 2>/dev/null || echo "[AGENTS.md NOT FOUND]"
            echo ""
            echo "--- PR DIFF ---"
            cat pr_diff.txt 2>/dev/null || echo "[pr_diff.txt NOT FOUND]"
            echo "${delimiter}"
          } >> "$GITHUB_ENV"

      - name: Architect Review
        id: gemini-check
        run: |
          # Force JSON output schema
          PAYLOAD=$(jq -n --arg text "$REVIEW_TEXT" '{
            contents: [{parts: [{"text": $text}]}], 
            generationConfig: {
              temperature: 0.1,
              responseMimeType: "application/json"
            }
          }')
          
          MAX_RETRIES=5
          DELAY=1
          SUCCESS=false
          
          for i in $(seq 1 $MAX_RETRIES); do
            API_RES=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
              -H 'Content-Type: application/json' \
              -d "$PAYLOAD")
              
            CLEAN_TEXT=$(echo "$API_RES" | jq -r '.candidates[0].content.parts[0].text // empty')
            
            if [[ -n "$CLEAN_TEXT" ]]; then
              SUCCESS=true
              break
            fi
            sleep $DELAY
            DELAY=$((DELAY * 2))
          done
          
          if [ "$SUCCESS" = false ]; then
            echo "::error::Gemini API Failed after 5 retries."
            exit 1
          fi
          
          STATUS=$(echo "$CLEAN_TEXT" | jq -r '.status')
          FEEDBACK=$(echo "$CLEAN_TEXT" | jq -r '.feedback')
          
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          
          delimiter="$(openssl rand -hex 8)"
          echo "feedback<<${delimiter}" >> "$GITHUB_OUTPUT"
          echo "$FEEDBACK" >> "$GITHUB_OUTPUT"
          echo "${delimiter}" >> "$GITHUB_OUTPUT"

      - name: Submit GitHub PR Review
        run: |
          EVENT="REQUEST_CHANGES"
          if [ "${{ steps.gemini-check.outputs.status }}" = "APPROVE" ]; then
            EVENT="APPROVE"
          fi
          
          PAYLOAD=$(jq -n --arg body "${{ steps.gemini-check.outputs.feedback }}" --arg event "$EVENT" '{body: $body, event: $event}')
          
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
            -d "$PAYLOAD"
            
          if [ "$EVENT" = "REQUEST_CHANGES" ]; then
            exit 1
          fi